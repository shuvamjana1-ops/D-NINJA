<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'NINJA — Logo Catalog</title>
    <meta name="description" content="D'NINJA Logo design catalog — browse all Logo work.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="catalog-body">
    <div id="cursor-dot" class="cursor-dot"></div>
    <div id="cursor-ring" class="cursor-ring"></div>

    <nav class="catalog-nav">
        <a href="index.html#projects" class="catalog-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="catalog-right" style="display:flex;align-items:center;gap:24px;">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
            <div class="catalog-title">Logo</div>
        </div>
    </nav>

    <div class="gallery-scroll-wrap" id="scroll-wrap">
        <div class="gallery-track" id="gallery-track" data-folder="logo" data-label="Logo">
            <!-- Images are loaded automatically from images/logo/ -->
        </div>
    </div>

    <script>
        // ── Theme Toggle ──
        const initTheme = () => {
            const savedTheme = localStorage.getItem('dninja-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-mode');
            }
            updateThemeIcons();
        };
        const updateThemeIcons = () => {
            const isDark = document.body.classList.contains('dark-mode');
            document.querySelectorAll('.theme-toggle i').forEach(icon => {
                icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });
        };
        document.querySelectorAll('.theme-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('dninja-theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
                updateThemeIcons();
            });
        });
        initTheme();

        // ── Auto-load images from folder ──
        const track = document.getElementById('gallery-track');
        const folder = track.dataset.folder;
        const label = track.dataset.label;
        const MAX = 30;
        let loaded = 0;

        function tryLoad(i) {
            const src = `images/${folder}/${folder}-${i}.jpg`;
            const img = new Image();
            img.onload = () => {
                loaded++;
                const frame = document.createElement('div');
                frame.className = 'gallery-frame';
                frame.innerHTML = `
                    <div class="gf-inner">
                        <img src="${src}" alt="${label} Design ${i}" class="gf-img">
                        <div class="gf-caption">
                            <span class="gf-text">${label} Project</span>
                            <span class="gf-num">${String(i).padStart(2,'0')}</span>
                        </div>
                    </div>`;
                track.appendChild(frame);
                // cursor hover
                frame.addEventListener('mouseenter', () => ring.classList.add('hov'));
                frame.addEventListener('mouseleave', () => ring.classList.remove('hov'));
            };
            // also try .png and .jpeg
            img.onerror = () => {
                const srcPng = `images/${folder}/${folder}-${i}.png`;
                const imgPng = new Image();
                imgPng.onload = () => {
                    loaded++;
                    const frame = document.createElement('div');
                    frame.className = 'gallery-frame';
                    frame.innerHTML = `
                        <div class="gf-inner">
                            <img src="${srcPng}" alt="${label} Design ${i}" class="gf-img">
                            <div class="gf-caption">
                                <span class="gf-text">${label} Project</span>
                                <span class="gf-num">${String(i).padStart(2,'0')}</span>
                            </div>
                        </div>`;
                    track.appendChild(frame);
                    frame.addEventListener('mouseenter', () => ring.classList.add('hov'));
                    frame.addEventListener('mouseleave', () => ring.classList.remove('hov'));
                };
                imgPng.onerror = () => {};
                imgPng.src = srcPng;
            };
            img.src = src;
        }

        // Queue all attempts
        for (let i = 1; i <= MAX; i++) tryLoad(i);

        // Show empty state after a short wait if nothing loaded
        setTimeout(() => {
            if (loaded === 0) {
                track.innerHTML = `
                    <div class="catalog-empty">
                        <i class="fas fa-folder-open"></i>
                        <p>Drop your images into<br><code>images/${folder}/</code></p>
                        <span>Name them: <code>${folder}-1.jpg</code>, <code>${folder}-2.jpg</code> …</span>
                    </div>`;
            }
        }, 1500);

        // ── Smooth horizontal scroll ──
        const scrollWrap = document.getElementById('scroll-wrap');
        scrollWrap.addEventListener('wheel', (evt) => {
            evt.preventDefault();
            scrollWrap.scrollBy({ left: evt.deltaY * 2, behavior: 'smooth' });
        });

        // ── Custom Cursor ──
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        });
        (function anim() {
            rx += (mx - rx) * 0.1; ry += (my - ry) * 0.1;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(anim);
        })();
        document.querySelectorAll('a, .theme-toggle').forEach(el => {
            el.addEventListener('mouseenter', () => ring.classList.add('hov'));
            el.addEventListener('mouseleave', () => ring.classList.remove('hov'));
        });
    </script>
</body>
</html>
