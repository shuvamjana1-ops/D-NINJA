<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart &mdash; D'NINJA</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="cursor-dot" class="cursor-dot"></div>
    <div id="cursor-ring" class="cursor-ring"></div>
    <div id="cursor-label" class="cursor-label"></div>
    <div class="noise-overlay"></div>

    <div id="preloader" class="preloader">
        <div class="pre-content" style="text-align: center;">
            <h2 class="pre-logo-liquid">D'NINJA</h2>
            <div class="pre-status">REFINING CART / <span id="pre-percent">0</span>%</div>
        </div>
    </div>
    <nav class="navbar" style="position: fixed; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px);">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-placeholder">
                    <img src="assets/img/dninja_logo.png" alt="D'NINJA" class="nav-logo-img">
                </div>
                <span class="nav-logo-text">D'NINJA</span>
            </a>
            <div class="nav-right">
                <a href="catalog/catalog-all.html" class="nav-link"><i class="fas fa-th"></i> Browse Designs</a>
            </div>
        </div>
    </nav>

    <main class="cart-page">
        <div class="cart-header">
            <h1>YOUR CART</h1>
            <p id="item-count-text">Review your selected designs</p>
        </div>

        <div id="cart-content">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script src="assets/js/cart.js"></script>
    <script>
        function renderCart() {
            const container = document.getElementById('cart-content');
            const items = window.dninjaCart.items;

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-basket"></i>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added any designs yet.</p>
                        <a href="catalog/catalog-all.html">Start Browsing</a>
                    </div>
                `;
                document.getElementById('item-count-text').textContent = "0 items in your cart";
                return;
            }

            let itemsHTML = '<div class="cart-container"><div class="cart-items-list">';
            items.forEach(item => {
                itemsHTML += `
                    <div class="cart-item">
                        <img src="${item.src}" alt="${item.name}" class="cart-item-img">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-category">${item.folder}</div>
                            <div class="cart-item-price">&#8377;${item.price}</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="window.dninjaCart.updateQuantity('${item.id}', -1)">-</button>
                            <span class="qty-val">${item.quantity}</span>
                            <button class="qty-btn" onclick="window.dninjaCart.updateQuantity('${item.id}', 1)">+</button>
                            <button class="remove-btn" onclick="window.dninjaCart.removeItem('${item.id}')" title="Remove">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            itemsHTML += '</div>';

            // Summary Sidebar
            const subtotal = window.dninjaCart.getSubtotal();
            const discount = window.dninjaCart.getDiscount();
            const total = window.dninjaCart.getTotal();
            const coupon = window.dninjaCart.coupon;

            itemsHTML += `
                <div class="cart-summary">
                    <div class="summary-title">Order Summary</div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>&#8377;${subtotal}</span>
                    </div>
                    ${discount > 0 ? `
                        <div class="summary-row">
                            <span class="discount-tag">Discount (${coupon})</span>
                            <span class="discount-tag">-&#8377;${discount.toFixed(2)}</span>
                        </div>
                    ` : ''}
                    <div class="summary-row">
                        <span>Platform Fee</span>
                        <span>FREE</span>
                    </div>
                    
                    <div class="coupon-box">
                        <input type="text" id="coupon-input" class="coupon-input" placeholder="Coupon Code" value="${coupon || ''}">
                        <button onclick="applyCoupon()" class="coupon-btn">Apply</button>
                    </div>
                    ${coupon ? `<button onclick="window.dninjaCart.removeCoupon()" style="background:none; border:none; color:var(--dim); font-size:0.8rem; cursor:pointer; margin-top:5px;">Remove Coupon</button>` : ''}

                    <div class="summary-row total">
                        <span>Total</span>
                        <span>&#8377;${total.toFixed(2)}</span>
                    </div>

                    <button onclick="proceedToCheckout()" class="checkout-btn">
                        <span>Proceed to Order</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <p style="text-align:center; font-size:0.8rem; color:var(--dim); margin-top:15px;">
                        <i class="fas fa-lock"></i> Secure checkout powered by D'NINJA Systems
                    </p>
                </div>
            </div>`;

            container.innerHTML = itemsHTML;
            document.getElementById('item-count-text').textContent = `${window.dninjaCart.getItemCount()} items in your cart`;
        }

        function applyCoupon() {
            const input = document.getElementById('coupon-input');
            const res = window.dninjaCart.applyCoupon(input.value);
            if (!res.success) {
                alert(res.message);
            }
        }

        async function proceedToCheckout() {
            const btn = document.querySelector('.checkout-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;

            const success = await window.dninjaCart.checkout();
            
            if (!success) {
                // If it fails (no backend), the checkout method already opens Google Forms as fallback
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                renderCart(); // Refresh cart UI
            }
        }

        window.addEventListener('cartUpdated', renderCart);
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
    <script src="assets/js/script.js"></script>
</body>
</html>
