<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout &mdash; D'NINJA</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .checkout-page {
            min-height: 100vh;
            padding: 140px 20px 80px;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
        }
        .checkout-container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
        }
        @media (max-width: 768px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
        .checkout-form-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dim);
            font-size: 0.9rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .checkout-summary {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            height: fit-content;
            position: sticky;
            top: 140px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .summary-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.4rem;
            color: #fff;
        }
        .advance-pill {
            background: rgba(124, 58, 237, 0.1);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(95, 15, 255, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="dark-mode">
    <nav class="navbar" style="position: fixed; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px);">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-placeholder">
                    <img src="assets/img/dninja_logo.png" alt="D'NINJA" class="nav-logo-img">
                </div>
                <span class="nav-logo-text">D'NINJA</span>
            </a>
            <div class="nav-right">
                <a href="cart.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Cart</a>
            </div>
        </div>
    </nav>

    <main class="checkout-page">
        <div class="checkout-container">
            <div class="checkout-form-box">
                <h2 style="font-family: var(--display); font-size: 2.5rem; margin-bottom: 30px;">Mission Details</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" id="whatsapp" required placeholder="+91 XXXXX XXXXX">
                    </div>
                    <div class="form-group">
                        <label>Delivery/Billing Address</label>
                        <textarea id="address" rows="3" required placeholder="Enter your full address"></textarea>
                    </div>
                    
                    <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
                        <p style="font-size: 0.85rem; color: var(--dim); line-height: 1.5;">
                            <i class="fas fa-info-circle" style="color: var(--accent);"></i> By submitting, you agree to pay the <strong>60% advance</strong> to initiate the design process. The remaining 40% will be paid before final delivery.
                        </p>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span>Confirm Mission</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>

            <div class="checkout-summary">
                <h3 style="margin-bottom: 20px;">Order Summary</h3>
                <div id="summary-items">
                    <!-- Dynamic Items -->
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="total-amount">₹0</span>
                </div>
                <div class="advance-pill">
                    <i class="fas fa-shield-alt"></i> Advance Due (60%): <strong id="advance-amount">₹0</strong>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = window.dninjaCart;
            if (cart.items.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            // Render Summary
            const container = document.getElementById('summary-items');
            cart.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'summary-item';
                div.innerHTML = `
                    <span>${item.name} (x${item.quantity})</span>
                    <span>₹${item.price * item.quantity}</span>
                `;
                container.appendChild(div);
            });

            const total = cart.getTotal();
            const advance = Math.round(total * 0.60);
            document.getElementById('total-amount').textContent = `₹${total.toFixed(2)}`;
            document.getElementById('advance-amount').textContent = `₹${advance}`;

            // Handle Form
            const form = document.getElementById('checkout-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Transmitting Brief...';

                const orderData = {
                    items: cart.items,
                    customerName: document.getElementById('name').value,
                    customerEmail: document.getElementById('email').value,
                    customerWhatsApp: document.getElementById('whatsapp').value,
                    customerAddress: document.getElementById('address').value,
                    coupon: cart.coupon
                };

                try {
                    const response = await fetch('http://localhost:5000/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(orderData)
                    });

                    const result = await response.json();
                    if (result.success) {
                        cart.items = [];
                        cart.save();
                        window.location.href = `success.html?orderId=${result.orderId}&advance=${result.advanceAmount}`;
                    } else {
                        alert("Server Error: " + (result.message || "Failed to save order. Check if your IP is whitelisted in MongoDB Atlas."));
                        btn.disabled = false;
                        btn.innerHTML = '<span>Confirm Mission</span> <i class="fas fa-paper-plane"></i>';
                    }
                } catch (err) {
                    alert("Network Error: Could not connect to the backend server. Make sure it is running (npm run dev).");
                    btn.disabled = false;
                    btn.innerHTML = '<span>Confirm Mission</span> <i class="fas fa-paper-plane"></i>';
                }
            });
        });
    </script>
</body>
</html>
