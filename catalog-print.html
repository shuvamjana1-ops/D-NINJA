<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'NINJA — Print Design Catalog</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="catalog-body">
    <div id="cursor-dot" class="cursor-dot"></div>
    <div id="cursor-ring" class="cursor-ring"></div>

    <nav class="catalog-nav">
        <a href="index.html#projects" class="catalog-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="catalog-right" style="display: flex; align-items: center; gap: 24px;">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                <i class="fas fa-moon"></i>
            </button>
            <div class="catalog-title">Print</div>
        </div>
    </nav>

    <!-- Horizontal scroll wrapper -->
    <div class="gallery-scroll-wrap" id="scroll-wrap">
        <div class="gallery-track" id="gallery-track">

            <!-- FRAME 1 -->
            <div class="gallery-frame">
                <div class="gf-inner">
                    <!-- YOUR DESIGN: Replace src with your Print design file -->
                    <div class="gf-placeholder" id="ph1">
                        <i class="fas fa-book-open"></i>
                        <span>Upload Design 1</span>
                    </div>
                    <img src="print1.jpg" alt="Print Design Layout" class="gf-img"
                        onerror="this.style.display='none'; document.getElementById('ph1').style.display='flex'">

                    <div class="gf-caption">
                        <span class="gf-text">Magazine Editorial Spread</span>
                        <span class="gf-num">01</span>
                    </div>
                </div>
            </div>

            <!-- FRAME 2 -->
            <div class="gallery-frame">
                <div class="gf-inner">
                    <!-- YOUR DESIGN: Replace src with your Print design file -->
                    <div class="gf-placeholder" id="ph2">
                        <i class="fas fa-id-card"></i>
                        <span>Upload Design 2</span>
                    </div>
                    <img src="print2.jpg" alt="Print Design Layout" class="gf-img"
                        onerror="this.style.display='none'; document.getElementById('ph2').style.display='flex'">

                    <div class="gf-caption">
                        <span class="gf-text">Premium Stationery & Cards</span>
                        <span class="gf-num">02</span>
                    </div>
                </div>
            </div>

            <!-- FRAME 3 -->
            <div class="gallery-frame">
                <div class="gf-inner">
                    <!-- YOUR DESIGN: Replace src with your Print design file -->
                    <div class="gf-placeholder" id="ph3">
                        <i class="fas fa-box"></i>
                        <span>Upload Design 3</span>
                    </div>
                    <img src="print3.jpg" alt="Print Design Layout" class="gf-img"
                        onerror="this.style.display='none'; document.getElementById('ph3').style.display='flex'">

                    <div class="gf-caption">
                        <span class="gf-text">Product Packaging Layout</span>
                        <span class="gf-num">03</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ── Theme Toggle ──
        const initTheme = () => {
            const savedTheme = localStorage.getItem('dninja-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-mode');
            }
            updateThemeIcons();
        };

        const updateThemeIcons = () => {
            const isDark = document.body.classList.contains('dark-mode');
            document.querySelectorAll('.theme-toggle i').forEach(icon => {
                icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });
        };

        document.querySelectorAll('.theme-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('dninja-theme', isDark ? 'dark' : 'light');
                updateThemeIcons();
            });
        });
        initTheme();

        const scrollWrap = document.getElementById('scroll-wrap');
        scrollWrap.addEventListener('wheel', (evt) => {
            evt.preventDefault();
            scrollWrap.scrollBy({ left: evt.deltaY * 2, behavior: 'smooth' });
        });

        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        });
        (function anim() {
            rx += (mx - rx) * 0.1; ry += (my - ry) * 0.1;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(anim);
        })();

        document.querySelectorAll('a, .gallery-frame, .theme-toggle').forEach(el => {
            el.addEventListener('mouseenter', () => ring.classList.add('hov'));
            el.addEventListener('mouseleave', () => ring.classList.remove('hov'));
        });
    </script>
</body>

</html>
